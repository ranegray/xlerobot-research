camera_name: camera
camera_namespace: ""
device_type: d435

enable_color: true
rgb_camera.color_profile: "640,480,30"
rgb_camera.color_format: RGB8

enable_depth: true
depth_module.depth_profile: "640,480,30"
depth_module.depth_format: Z16

align_depth.enable: true

pointcloud.enable: false

enable_infra1: false
enable_infra2: false
enable_gyro: false
enable_accel: false

publish_tf: true
tf_publish_rate: 0.0

# Frame integration: the URDF chain ends at head_camera_link. realsense
# publishes its frames rooted at <camera_name>_<base_frame_id> = camera_link
# (camera_name=camera + base_frame_id=link default). Note base_frame_id is
# the SUFFIX, not the full frame name — realsense always prepends camera_name
# + "_". The realsense launch adds a static_transform_publisher bridging
# head_camera_link -> camera_link at zero offset.
base_frame_id: link

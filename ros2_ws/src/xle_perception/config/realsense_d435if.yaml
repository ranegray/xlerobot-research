camera_name: camera
camera_namespace: ""
device_type: d435

enable_color: true
rgb_camera.color_profile: "640,480,6"
rgb_camera.color_format: RGB8
rgb_camera.color_qos: SENSOR_DATA
rgb_camera.color_info_qos: SENSOR_DATA

enable_depth: true
depth_module.depth_profile: "640,480,6"
depth_module.depth_format: Z16
depth_module.depth_qos: SENSOR_DATA
depth_module.depth_info_qos: SENSOR_DATA

align_depth.enable: false

pointcloud.enable: false

enable_infra1: false
enable_infra2: false
enable_gyro: false
enable_accel: false

publish_tf: true
tf_publish_rate: 0.0

# realsense names this frame camera_<base_frame_id>, so "link" becomes
# camera_link. realsense.launch.py bridges head_camera_link -> camera_link.
base_frame_id: link
